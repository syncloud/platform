user root;

worker_processes 1;

pid /var/snap/platform/common/log/nginx_custom_proxy.pid;
error_log syslog:server=unix:/dev/log warn;

events {
    worker_connections 256;
}

http {
    access_log syslog:server=unix:/dev/log;

    client_body_temp_path /var/snap/platform/current/nginx/custom_proxy_client_body_temp;
    proxy_temp_path /var/snap/platform/current/nginx/custom_proxy_proxy_temp;
    fastcgi_temp_path /var/snap/platform/current/nginx/custom_proxy_fastcgi_temp;
    uwsgi_temp_path /var/snap/platform/current/nginx/custom_proxy_uwsgi_temp;
    scgi_temp_path /var/snap/platform/current/nginx/custom_proxy_scgi_temp;

    client_max_body_size 10G;
    proxy_send_timeout 600s;
    proxy_read_timeout 600s;
    proxy_buffering off;

    server {
        listen unix:/var/snap/platform/current/custom-proxy.socket;
        return 502;
    }
{{range .Entries}}
    server {
        listen unix:/var/snap/platform/current/custom-proxy.socket;
        server_name {{.ServerName}};
        location / {
            if ($http_x_syncloud_custom_proxy) {
                return 502;
            }
            proxy_set_header X-Syncloud-Custom-Proxy "1";
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $http_host;
            proxy_pass http://{{.Host}}:{{.Port}};
        }
    }
{{end}}
}
