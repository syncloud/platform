worker_processes 1;
pid /var/snap/testapp/current/nginx.pid;
error_log syslog:server=unix:/dev/log;
daemon off;

events {
    worker_connections 64;
}

http {
    access_log syslog:server=unix:/dev/log;
    client_body_temp_path /var/snap/testapp/current/nginx/client_body_temp;
    proxy_temp_path /var/snap/testapp/current/nginx/proxy_temp;
    fastcgi_temp_path /var/snap/testapp/current/nginx/fastcgi_temp;
    uwsgi_temp_path /var/snap/testapp/current/nginx/uwsgi_temp;
    scgi_temp_path /var/snap/testapp/current/nginx/scgi_temp;

    server {
        listen unix:/var/snap/testapp/common/web.socket;

        root /snap/testapp/current/www;

        include /var/snap/testapp/current/config/authelia-location.conf;
        include /var/snap/testapp/current/config/authelia-location-basic.conf;

        location / {
            include /var/snap/testapp/current/config/authelia-authrequest.conf;
            try_files $uri /index.html;
        }

        location /basic {
            include /var/snap/testapp/current/config/authelia-authrequest-basic.conf;
            try_files $uri /index.html;
        }

        location /oidc/ {
            proxy_pass http://unix:/var/snap/testapp/current/backend.sock: ;
        }
    }
}
