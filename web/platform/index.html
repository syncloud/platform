<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no">
    <link rel="icon" href="/favicon.ico">
    <title>Syncloud</title>
    <meta name="author" content="syncloud.org">
    <meta name="description" content="Your Personal Server">
    <meta name="keywords" content="Your Personal Server">
    <script>
      (function () {
        try {
          var saved = localStorage.getItem('syncloud-theme')
          var dark = saved === 'dark' || (!saved && window.matchMedia &&
            window.matchMedia('(prefers-color-scheme: dark)').matches)
          document.documentElement.setAttribute('data-theme', dark ? 'dark' : 'light')
        } catch (e) {}
      })()
    </script>
  </head>
  <body>
    <noscript>
        <strong>We're sorry but this app doesn't work properly without JavaScript enabled. Please enable it to continue.</strong>
    </noscript>
    <div id="app"></div>
    <!-- built files will be auto injected -->
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
